<!DOCTYPE html>
<html lang="es">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZLCSX51HFM"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjugar — A1/A2</title>
<link rel="icon" href="icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2D5016">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --text: #1A1714;
    --text-muted: #8C8580;
    --accent: #2D5016;
    --accent-light: #EBF2E3;
    --accent2: #C85A1B;
    --irreg: #C85A1B;
    --irreg-bg: #FDF0E8;
    --a1: #2D5016;
    --a2: #1A4A6B;
    --a2-bg: #E8F2F8;
    --shadow: 0 2px 16px rgba(26,23,20,0.07);
    --radius: 16px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #141210;
    --surface: #1E1C1A;
    --border: #2E2B28;
    --text: #F0EDE8;
    --text-muted: #7A756F;
    --accent: #5A9E35;
    --accent-light: #1E2E14;
    --accent2: #E07840;
    --irreg: #E07840;
    --irreg-bg: #2A1C10;
    --a1: #5A9E35;
    --a2: #4A8AB0;
    --a2-bg: #0E1E2A;
    --shadow: 0 2px 16px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
  }
  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .nav-tabs {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 10px;
    padding: 3px;
    flex-shrink: 0;
  }
  .nav-tab {
    padding: 6px 12px;
    border-radius: 7px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .nav-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .nav-right { display: flex; justify-content: flex-end; flex-shrink: 0; }

  /* PAGES */
  .page { display: none; flex: 1; }
  .page.active { display: flex; flex-direction: column; }

  /* ======= PRACTICE PAGE ======= */
  #page-practice {
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  /* Category bar */
  .category-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 760px;
    width: 100%;
  }
  .cat-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Main card */
  .card-wrap {
    max-width: 520px;
    width: 100%;
    perspective: 1000px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 48px 40px 40px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    user-select: none;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(26,23,20,0.1); }
  .card:active { transform: translateY(0); }

  .card-stage-label {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text-muted);
  }

  .card-sound-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    font-size: 16px;
  }
  .card-sound-btn:hover { background: var(--accent-light); border-color: var(--accent); }

  .pronoun-badge {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: 8px;
    padding: 5px 14px;
    letter-spacing: -0.3px;
  }

  .card-infinitive {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .card-meaning {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .card-level-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 5px;
  }
  .level-a1 { background: var(--accent-light); color: var(--accent); }
  .level-a2 { background: var(--a2-bg); color: var(--a2); }

  /* Answer state */
  .card-answer {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .card.revealed .card-answer { display: flex; }
  .card.revealed .card-pre-reveal { display: none; }
  .card-pre-reveal { display: flex; flex-direction: column; align-items: center; gap: 12px; }

  .conjugated-form {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: var(--accent);
    letter-spacing: -1.5px;
    line-height: 1.0;
  }
  .conjugated-form.irregular {
    color: var(--irreg);
  }

  .irreg-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--irreg);
    background: var(--irreg-bg);
    border-radius: 5px;
    padding: 3px 8px;
  }

  .click-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    opacity: 0.7;
  }

  /* Card bottom row — prev/next nav buttons */
  .card-controls {
    max-width: 520px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .nav-arrow-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    color: var(--text-muted);
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  .nav-arrow-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
    transform: scale(1.05);
  }
  .nav-arrow-btn:active { transform: scale(0.96); }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    min-width: 80px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-count {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ======= REFERENCE PAGE ======= */
  #page-reference {
    padding: 24px 16px;
    align-items: center;
  }
  .ref-container {
    max-width: 860px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .ref-header {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .ref-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .tense-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tense-block-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tense-name {
    font-weight: 600;
    font-size: 15px;
  }
  .tense-level {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .tense-block-body {
    padding: 16px;
  }
  .tense-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  .endings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) {
    .endings-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
  @media (max-width: 380px) {
    .endings-grid {
      grid-template-columns: 1fr;
    }
  }
  .ending-group {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px;
    min-width: 0;
  }
  .ending-group-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .ending-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 12px;
    gap: 4px;
  }
  .ending-pron { color: var(--text-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ending-end {
    font-weight: 600;
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .ending-end.irreg-ending { color: var(--irreg); }

  .example-verb {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .example-verb span { color: var(--text); font-weight: 500; }

  /* ======= SETTINGS PAGE ======= */
  #page-settings {
    padding: 24px 16px;
    align-items: center;
  }
  .settings-container {
    max-width: 600px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .settings-header {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: var(--text);
  }
  .settings-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .settings-section-title {
    padding: 14px 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 14px; font-weight: 500; }
  .settings-row-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Toggle */
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: var(--transition);
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider:before { transform: translateX(20px); }

  /* Checkbox group */
  .checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 16px 20px;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 8px;
    transition: var(--transition);
  }
  .checkbox-item:hover { background: var(--bg); }
  .checkbox-item input { display: none; }
  .checkbox-box {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
  }
  .checkbox-item input:checked ~ .checkbox-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox-item input:checked ~ .checkbox-box::after {
    content: '✓';
    color: white;
    font-size: 11px;
    font-weight: 700;
  }
  .checkbox-label { font-size: 13px; font-weight: 500; }
  .checkbox-sublabel { font-size: 11px; color: var(--text-muted); }

  /* Animate card flip */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeSlideUp 0.28s ease forwards; }

  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.5; }
  }
  .speaking { animation: pulse 0.6s ease infinite; }

  .lang-option-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
  }
  .lang-option-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-option-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ======= VOCAB PAGE ======= */
  #page-vocab {
    padding: 24px 16px;
    align-items: center;
  }
  .vocab-container {
    max-width: 860px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .vocab-header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .vocab-filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .vocab-group-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 4px 4px;
    border-bottom: 1px solid var(--border);
    margin-top: 8px;
  }
  .vocab-item {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    gap: 14px;
    transition: var(--transition);
  }
  .vocab-item.mastered {
    opacity: 0.45;
    background: var(--bg);
  }
  .vocab-item.mastered .vocab-inf {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .vocab-inf {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
    min-width: 110px;
    flex-shrink: 0;
  }
  .vocab-meaning {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
    min-width: 0;
  }
  .vocab-meaning-en { color: var(--text); font-weight: 500; }
  .vocab-badges {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    align-items: center;
  }
  .vocab-level {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
  }
  .vocab-mastered-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: var(--transition);
    flex-shrink: 0;
  }
  .vocab-mastered-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .vocab-mastered-btn.is-mastered {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">conjugar</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="nav-practice" onclick="showPage('practice')">Practice</button>
    <button class="nav-tab" id="nav-vocab" onclick="showPage('vocab')">Vocab</button>
    <button class="nav-tab" id="nav-reference" onclick="showPage('reference')">Grammar</button>
    <button class="nav-tab" id="nav-settings" onclick="showPage('settings')">Settings</button>
  </div>
  <div class="nav-right"></div>
</nav>

<!-- ====== PRACTICE PAGE ====== -->
<div id="page-practice" class="page active">

  <div class="category-bar" id="categoryBar"></div>

  <div class="card-wrap">
    <div class="card" id="mainCard" onclick="handleCardClick()">
      <div class="card-stage-label" id="stageLabel">Presente</div>
      <button class="card-sound-btn" id="soundBtn" onclick="event.stopPropagation(); speakCurrent()" title="朗读">🔊</button>

      <div class="card-pre-reveal" id="preReveal">
        <div class="pronoun-badge" id="pronounBadge">yo</div>
        <div class="card-infinitive" id="infinitiveDisplay">hablar</div>
        <div class="card-meaning" id="meaningDisplay">to speak · 说/讲话</div>
        <div class="card-level-badge" id="levelBadge">A1</div>
        <div class="click-hint" data-i18n="hint_reveal">点击查看变位 · 再次点击下一题</div>
      </div>

      <div class="card-answer" id="answerReveal">
        <div class="pronoun-badge" id="answerPronoun">yo</div>
        <div class="conjugated-form" id="conjugatedForm">hablo</div>
        <div class="irreg-tag" id="irregTag" style="display:none" data-i18n="irregular_tag">不规则 ⚡</div>
        <div class="card-meaning" id="answerMeaning">to speak · 说/讲话</div>
        <div class="click-hint" style="margin-top:4px" data-i18n="hint_next">再次点击下一题</div>
      </div>
    </div>
  </div>

  <div class="card-controls">
    <button class="nav-arrow-btn" onclick="prevCard()" title="上一个">←</button>
    <div class="progress-wrap" style="flex:1">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-count" id="progressCount">0 / 0</div>
    </div>
    <button class="nav-arrow-btn" onclick="nextCard()" title="下一个">→</button>
  </div>

</div>

<!-- ====== VOCAB PAGE ====== -->
<div id="page-vocab" class="page">
  <div class="vocab-container">
    <div class="vocab-header-row">
      <div>
        <div class="ref-header" id="vocab-title">词库</div>
        <div class="ref-subtitle" id="vocab-subtitle">标记已掌握的动词，练习时自动跳过</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
        <span id="vocab-count" style="font-size:13px;color:var(--text-muted)"></span>
        <button onclick="clearAllMastered()" id="vocab-clear-btn" style="font-size:12px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">全部重置</button>
      </div>
    </div>

    <div class="vocab-filter-bar" id="vocabFilterBar"></div>

    <div class="vocab-list" id="vocabList"></div>

function buildReference() {
  const data = REF_CONTENT[currentLang] || REF_CONTENT.en;
  const container = document.getElementById('refContainer');
  if (!container) return;

  const rowHTML = (rows, irreg) => rows.map(([p, e]) =>
    `<div class="ending-row"><span class="ending-pron">${p}</span><span class="ending-end${irreg?' irreg-ending':''}">${e}</span></div>`
  ).join('');

  const groupHTML = (g) => {
    if (g.span2) {
      return `<div class="ending-group" style="grid-column:span 2">
        <div class="ending-group-title">${g.title}</div>
        ${g.examples.map(e=>`<div style="font-size:13px;line-height:2.2">${e}</div>`).join('')}
      </div>`;
    }
    return `<div class="ending-group">
      <div class="ending-group-title">${g.title}</div>
      ${rowHTML(g.rows, g.irreg)}
      ${g.note ? `<div style="margin-top:8px;font-size:12px;color:var(--text-muted);white-space:pre-line">${g.note}</div>` : ''}
    </div>`;
  };

  const blockHTML = (b) => `
    <div class="tense-block">
      <div class="tense-block-header">
        <div class="tense-name">${b.name}</div>
        <div class="tense-level ${b.cls}">${b.level}</div>
      </div>
      <div class="tense-block-body">
        <div class="tense-desc">${b.desc}</div>
        <div class="endings-grid">${b.groups.map(groupHTML).join('')}</div>
        ${b.note ? `<div class="example-verb">${b.note}</div>` : ''}
      </div>
    </div>`;

  container.innerHTML = `
    <div>
      <div class="ref-header">${data.header}</div>
      <div class="ref-subtitle">${data.subtitle}</div>
    </div>
    ${data.blocks.map(blockHTML).join('')}
  `;
}

const LS_SETTINGS = 'conjugar_settings';
const LS_PROGRESS = 'conjugar_progress';
const LS_MASTERED = 'conjugar_mastered';

function saveMastered() {
  localStorage.setItem(LS_MASTERED, JSON.stringify([...state.mastered]));
}

function loadMastered() {
  try {
    const arr = JSON.parse(localStorage.getItem(LS_MASTERED)) || [];
    state.mastered = new Set(arr);
  } catch(e) { state.mastered = new Set(); }
}

function toggleMastered(inf) {
  if (state.mastered.has(inf)) state.mastered.delete(inf);
  else state.mastered.add(inf);
  saveMastered();
  buildQueue();
  renderCard();
  renderVocabList();
}

function clearAllMastered() {
  state.mastered = new Set();
  saveMastered();
  buildQueue();
  renderCard();
  renderVocabList();
}

let vocabFilter = '全部';

function buildVocabFilterBar() {
  const bar = document.getElementById('vocabFilterBar');
  if (!bar) return;
  const cats = ['全部', ...new Set(VERBS.map(v => v.cat))];
  bar.innerHTML = cats.map(c =>
    `<button class="cat-btn${c === vocabFilter ? ' active' : ''}" onclick="setVocabFilter('${c}')">${
      currentLang === 'en' ? catZhToEn(c) : c
    }</button>`
  ).join('');
}

function catZhToEn(zh) {
  const tr = TRANSLATIONS['en'].cats;
  const zh_cats = TRANSLATIONS['zh'].cats;
  const idx = zh_cats.indexOf(zh);
  return idx >= 0 ? tr[idx] : zh;
}

function setVocabFilter(cat) {
  vocabFilter = cat;
  buildVocabFilterBar();
  renderVocabList();
}

function renderVocabList() {
  const el = document.getElementById('vocabList');
  const countEl = document.getElementById('vocab-count');
  if (!el) return;

  let verbs = vocabFilter === '全部' ? VERBS : VERBS.filter(v => v.cat === vocabFilter);

  const masteredCount = [...state.mastered].filter(inf => VERBS.some(v => v.inf === inf)).length;
  if (countEl) countEl.textContent = `${masteredCount} / ${VERBS.length} ${t('vocab_mastered_label')}`;

  // Group by category
  const groups = {};
  verbs.forEach(v => {
    if (!groups[v.cat]) groups[v.cat] = [];
    groups[v.cat].push(v);
  });

  let html = '';
  Object.entries(groups).forEach(([cat, list]) => {
    if (vocabFilter === '全部') {
      const label = currentLang === 'en' ? catZhToEn(cat) : cat;
      html += `<div class="vocab-group-title">${label}</div>`;
    }
    list.forEach(v => {
      const isMastered = state.mastered.has(v.inf);
      const levelColor = v.level === 'A1' ? 'var(--a1)' : 'var(--a2)';
      const levelBg = v.level === 'A1' ? 'var(--accent-light)' : 'var(--a2-bg)';
      const meaning = currentLang === 'en' ? v.en : `${v.en} · ${v.zh}`;
      html += `
        <div class="vocab-item${isMastered ? ' mastered' : ''}" id="vocab-${v.inf.replace(/\s/g,'_')}"
             onclick="openConjModal('${v.inf}')">
          <div class="vocab-inf">${v.inf}</div>
          <div class="vocab-meaning">${meaning}</div>
          <div class="vocab-badges">
            <span class="vocab-level" style="color:${levelColor};background:${levelBg}">${v.level}</span>
            <button class="vocab-mastered-btn${isMastered ? ' is-mastered' : ''}"
              onclick="event.stopPropagation(); toggleMastered('${v.inf}')"
              title="${isMastered ? t('vocab_unmaster') : t('vocab_master')}">
              ${isMastered ? '✓' : ''}
            </button>
          </div>
        </div>`;
    });
  });
  el.innerHTML = html;
}

function saveSettings() {
  const s = {
    category: state.category,
    activeTenses: state.activeTenses,
    activePronouns: state.activePronouns,
    verbLevels: state.verbLevels,
    irregFilter: state.irregFilter,
    autoSpeak: state.autoSpeak,
    speakAnswer: state.speakAnswer,
    lang: currentLang,
    darkMode: document.documentElement.getAttribute('data-theme') === 'dark',
  };
  localStorage.setItem(LS_SETTINGS, JSON.stringify(s));
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS));
    if (!s) return;
    if (s.category) state.category = s.category;
    if (s.activeTenses) state.activeTenses = s.activeTenses;
    if (s.activePronouns) state.activePronouns = s.activePronouns;
    if (s.verbLevels) state.verbLevels = s.verbLevels;
    if (s.irregFilter) state.irregFilter = s.irregFilter;
    if (typeof s.autoSpeak === 'boolean') state.autoSpeak = s.autoSpeak;
    if (typeof s.speakAnswer === 'boolean') state.speakAnswer = s.speakAnswer;
    if (s.lang) currentLang = s.lang;
    if (s.darkMode) applyDarkMode(true, false);
  } catch(e) {}
}

function syncSettingsUI() {
  // toggles
  document.getElementById('toggleAutoSpeak').checked = state.autoSpeak;
  document.getElementById('toggleSpeakAnswer').checked = state.speakAnswer;
  document.getElementById('toggleDarkMode').checked =
    document.documentElement.getAttribute('data-theme') === 'dark';
  // level checkboxes
  document.getElementById('levelA1').checked = state.verbLevels.includes('A1');
  document.getElementById('levelA2').checked = state.verbLevels.includes('A2');
  // irregFilter radio
  setIrregFilter(state.irregFilter);
}

function applyDarkMode(on, save = true) {
  document.documentElement.setAttribute('data-theme', on ? 'dark' : 'light');
  const toggle = document.getElementById('toggleDarkMode');
  if (toggle) toggle.checked = on;
  // update theme-color meta for Android Chrome
  document.querySelector('meta[name="theme-color"]').content = on ? '#141210' : '#2D5016';
  if (save) saveSettings();
}

  applyDarkMode(this.checked);
});

// ── Progress tracking ──────────────────────────────────────
function getTodayKey() {
  return new Date().toISOString().slice(0, 10); // "2025-02-20"
}

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(LS_PROGRESS)) || {}; } catch(e) { return {}; }
}

function saveProgress(p) {
  localStorage.setItem(LS_PROGRESS, JSON.stringify(p));
}

function recordCard() {
  const p = loadProgress();
  const today = getTodayKey();
  p.total = (p.total || 0) + 1;
  p.byDay = p.byDay || {};
  p.byDay[today] = (p.byDay[today] || 0) + 1;
  // streak: count consecutive days up to today
  p.streak = calcStreak(p.byDay);
  saveProgress(p);
  renderProgressStats();
}

function calcStreak(byDay) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().slice(0, 10);
    if (byDay[key]) { streak++; d.setDate(d.getDate() - 1); }
    else if (i === 0) { d.setDate(d.getDate() - 1); } // today not yet practiced → check yesterday
    else break;
  }
  return streak;
}

function renderProgressStats() {
  const el = document.getElementById('progressStats');
  if (!el) return;
  const p = loadProgress();
  const today = getTodayKey();
  const todayCount = (p.byDay || {})[today] || 0;
  const stat = (label, value) =>
    `<div style="display:flex;justify-content:space-between;align-items:center;font-size:14px">
      <span style="color:var(--text-muted)">${label}</span>
      <span style="font-weight:600;font-size:16px;color:var(--accent)">${value}</span>
    </div>`;
  el.innerHTML =
    stat(t('progress_today'), `${todayCount} ${t('progress_cards')}`) +
    stat(t('progress_total'), `${p.total || 0} ${t('progress_cards')}`) +
    stat(t('progress_streak'), `${p.streak || 0} ${t('progress_days')}`);
}

function resetProgress() {
  localStorage.removeItem(LS_PROGRESS);
  renderProgressStats();
}

function buildTenseCheckboxes() {
  const container = document.getElementById('tenseCheckboxes');
  const tenseLabels = t('tense_labels');
  container.innerHTML = TENSES.map(tns => `
    <label class="checkbox-item">
      <input type="checkbox" ${state.activeTenses.includes(tns.id)?'checked':''} onchange="toggleTense('${tns.id}', this.checked)">
      <span class="checkbox-box"></span>
      <div>
        <div class="checkbox-label">${tns.name}</div>
        <div class="checkbox-sublabel">${tenseLabels[tns.id] || tns.label}</div>
      </div>
    </label>
  `).join('');
}

function buildPronounCheckboxes() {
  const container = document.getElementById('pronounCheckboxes');
  container.innerHTML = PRONOUNS.map((p, i) => `
    <label class="checkbox-item">
      <input type="checkbox" ${state.activePronouns.includes(i)?'checked':''} onchange="togglePronoun(${i}, this.checked)">
      <span class="checkbox-box"></span>
      <div><div class="checkbox-label">${p}</div></div>

function selectCategory(cat) {
  state.category = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-cat') === cat));
  saveSettings();
  buildQueue();
  renderCard();
}

function toggleTense(id, checked) {
  if (checked) { if (!state.activeTenses.includes(id)) state.activeTenses.push(id); }
  else { state.activeTenses = state.activeTenses.filter(t => t !== id); }
  if (state.activeTenses.length === 0) { state.activeTenses = [id]; buildTenseCheckboxes(); }
  saveSettings();
  buildQueue();
  renderCard();
}

function togglePronoun(idx, checked) {
  if (checked) { if (!state.activePronouns.includes(idx)) state.activePronouns.push(idx); }
  else { state.activePronouns = state.activePronouns.filter(i => i !== idx); }
  if (state.activePronouns.length === 0) { state.activePronouns = [idx]; buildPronounCheckboxes(); }
  saveSettings();
  buildQueue();
  renderCard();
}

function buildQueue() {
  let verbs = state.category === '全部' ? VERBS : VERBS.filter(v => v.cat === state.category);
  verbs = verbs.filter(v => state.verbLevels.includes(v.level));
  verbs = verbs.filter(v => !state.mastered.has(v.inf)); // skip mastered

  const items = [];
  verbs.forEach(v => {
    state.activeTenses.forEach(t => {
      if (!v.forms[t]) return;
      state.activePronouns.forEach(pi => {
        const form = v.forms[t][pi];
        if (!form || form === '—') return; // skip placeholder
        const isIrreg = (v.irregular[t] || []).includes(pi);
        if (state.irregFilter === 'regular' && isIrreg) return;
        if (state.irregFilter === 'irregular' && !isIrreg) return;
        items.push({ verb: v, tense: t, pronIdx: pi });
      });
    });
  });
  // Shuffle
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  state.queue = items;
  state.idx = 0;
  state.revealed = false;
  updateProgress();
}

const IMPERATIVO_LABELS = ['(yo —)','tú','usted','nosotros','vosotros','ustedes'];
const REFLEXIVO_LABELS = ['yo','tú','él/ella','nosotros','vosotros','ellos/ellas'];

function renderCard() {
  if (state.queue.length === 0) {
    document.getElementById('infinitiveDisplay').textContent = t('no_cards');
    document.getElementById('meaningDisplay').textContent = t('no_cards_sub');
    document.getElementById('stageLabel').textContent = '—';
    return;
  }
  const item = state.queue[state.idx % state.queue.length];
  const { verb, tense, pronIdx } = item;
  const form = verb.forms[tense][pronIdx];
  const isIrreg = (verb.irregular[tense] || []).includes(pronIdx);
  const tenseMeta = TENSES.find(t => t.id === tense);

  // Choose pronoun label based on tense
  let pronLabel;
  if (tense === 'imperativo') pronLabel = IMPERATIVO_LABELS[pronIdx];
  else pronLabel = PRONOUNS[pronIdx];

  // Meaning text — show zh only if current lang is zh
  const meaning = TRANSLATIONS[currentLang].show_zh
    ? `${item.verb.en} · ${item.verb.zh}`
    : item.verb.en;

  document.getElementById('stageLabel').textContent = tenseMeta ? tenseMeta.name : tense;
  document.getElementById('pronounBadge').textContent = pronLabel;
  document.getElementById('infinitiveDisplay').textContent = item.verb.inf;
  document.getElementById('meaningDisplay').textContent = meaning;
  const lvlBadge = document.getElementById('levelBadge');
  lvlBadge.textContent = item.verb.level;
  lvlBadge.className = 'card-level-badge ' + (item.verb.level === 'A1' ? 'level-a1' : 'level-a2');

  document.getElementById('answerPronoun').textContent = pronLabel;
  const conjEl = document.getElementById('conjugatedForm');
  conjEl.textContent = form;
  conjEl.className = 'conjugated-form' + (isIrreg ? ' irregular' : '');
  const irregTagEl = document.getElementById('irregTag');
  irregTagEl.style.display = isIrreg ? 'inline-block' : 'none';
  irregTagEl.textContent = t('irregular_tag');
  document.getElementById('answerMeaning').textContent = meaning;

  // Hide answer
  const card = document.getElementById('mainCard');
  card.classList.remove('revealed');
  state.revealed = false;

  // Animate
  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');

  updateProgress();

  // Auto speak — only when on practice page
  if (state.autoSpeak && currentPage === 'practice') {
    setTimeout(() => speakText(item.verb.inf), 200);
  }
}

function handleCardClick() {
  if (!state.revealed) {
    document.getElementById('mainCard').classList.add('revealed');
    state.revealed = true;
    if (state.speakAnswer && currentPage === 'practice') {
      const item = state.queue[state.idx % state.queue.length];
      speakText(item.verb.forms[item.tense][item.pronIdx]);
    }
  } else {
    nextCard();
  }
}

function nextCard() {
  state.idx = (state.idx + 1) % state.queue.length;
  recordCard();
  renderCard();
}

function prevCard() {
  state.idx = (state.idx - 1 + state.queue.length) % state.queue.length;
  renderCard();
}

function updateProgress() {
  const total = state.queue.length;
  const cur = state.idx + 1;
  const pct = total > 0 ? (cur / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${cur} / ${total}`;
}

let cachedVoice = null;

function loadVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  cachedVoice =
    voices.find(v => v.lang.startsWith('es') && v.name.includes('Google')) ||
    voices.find(v => v.lang === 'es-ES') ||
    voices.find(v => v.lang.startsWith('es')) ||
    null;
}

window.speechSynthesis.onvoiceschanged = () => { loadVoice(); };
// Also try immediately (works on desktop)
loadVoice();

function speakText(text) {
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'es-ES';
    utt.rate = 0.9;
    if (cachedVoice) utt.voice = cachedVoice;
    // Android workaround: re-attempt if voices not ready yet
    if (!cachedVoice) {
      loadVoice();
      if (cachedVoice) utt.voice = cachedVoice;
    }
    const btn = document.getElementById('soundBtn');
    if (btn) { btn.classList.add('speaking'); utt.onend = () => btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(utt);
  } catch(e) {}
}

function speakCurrent() {
  const item = state.queue[state.idx % state.queue.length];
  if (!item) return;
  const text = state.revealed ? item.verb.forms[item.tense][item.pronIdx] : item.verb.inf;
  speakText(text);
}

  if (checked) { if (!state.verbLevels.includes(level)) state.verbLevels.push(level); }

  state.irregFilter = val;
  ['all','regular','irregular'].forEach(v => {
    const el = document.getElementById('rb-' + v);
    if (el) {
      el.style.background = v === val ? 'var(--accent)' : '';
      el.style.borderColor = v === val ? 'var(--accent)' : '';
      el.innerHTML = v === val ? '<span style="color:white;font-size:11px;font-weight:700">✓</span>' : '';
    }
  });
  saveSettings();
  buildQueue(); renderCard();
}

  if (id === 'vocab') { buildVocabFilterBar(); renderVocabList(); }
}

let currentLang = 'en';

function t(key) {
  return TRANSLATIONS[currentLang][key] || TRANSLATIONS['zh'][key] || key;
}

function setLang(lang) {
  currentLang = lang;

  // Update settings language option buttons only
  ['zh','en'].forEach(l => {
    const optBtn = document.getElementById('lopt-' + l);
    if (optBtn) optBtn.classList.toggle('active', l === lang);
  });

  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });

  // Update nav tabs
  document.getElementById('nav-practice').textContent = t('nav_practice');
  document.getElementById('nav-vocab').textContent = t('nav_vocab');
  document.getElementById('nav-reference').textContent = t('nav_reference');
  document.getElementById('nav-settings').textContent = t('nav_settings');

  // Rebuild dynamic UI with translated text
  buildCategoryBar();
  buildTenseCheckboxes();
  buildPronounCheckboxes();
  buildReference();

  // Re-render card (updates meaning display language)
  renderCard();
  renderProgressStats();
  // Update vocab page text and rebuild list
  const vt = document.getElementById('vocab-title');
  const vs = document.getElementById('vocab-subtitle');
  const vc = document.getElementById('vocab-clear-btn');
  if (vt) vt.textContent = t('vocab_title');
  if (vs) vs.textContent = t('vocab_subtitle');
  if (vc) vc.textContent = t('vocab_clear');
  if (currentPage === 'vocab') { buildVocabFilterBar(); renderVocabList(); }
  saveSettings();
}

function init() {
  loadSettings();
  loadMastered();
  fetch('verbs.json')
    .then(r => r.json())
    .then(data => {
      VERBS = data;
      buildQueue();
      setLang(currentLang);
      syncSettingsUI();
      renderProgressStats();
    })
    .catch(() => {
      buildQueue();
      setLang(currentLang);
      syncSettingsUI();
      renderProgressStats();
    });
}

init();
</script>

<!-- ====== CONJUGATION MODAL ====== -->
<div id="conjModal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px" onclick="closeConjModal()">
  <div style="background:var(--surface);border-radius:20px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)" onclick="event.stopPropagation()">
    <div style="padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
      <div style="min-width:0">
        <div id="modal-inf" style="font-family:'DM Serif Display',serif;font-size:28px;color:var(--text)"></div>
        <div id="modal-meaning" style="font-size:14px;color:var(--text-muted);margin-top:4px"></div>
      </div>
      <button onclick="closeConjModal()" style="font-size:20px;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px 0;line-height:1;flex-shrink:0">✕</button>
    </div>
    <div id="modal-body" style="padding:16px 20px 24px"></div>
  </div>
</div>

<script>
const TENSE_DISPLAY_NAMES = {
  presente:   { zh: '现在时',         en: 'Present' },
  perfecto:   { zh: '近过去时',       en: 'Perfect' },
  indefinido: { zh: '简单过去时',     en: 'Preterite' },
  futuro:     { zh: '近将来',         en: 'Near Future' },
  reflexivo:  { zh: '反身动词现在时', en: 'Reflexive' },
  imperativo: { zh: '命令式',         en: 'Imperative' },
};

function openConjModal(inf) {
  const verb = VERBS.find(v => v.inf === inf);
  if (!verb) return;

  document.getElementById('modal-inf').textContent = inf;
  document.getElementById('modal-meaning').textContent =
    currentLang === 'en' ? verb.en : `${verb.en} · ${verb.zh}`;

  const pronounLabels = ['yo','tú','él/ella','nosotros','vosotros','ellos/ellas'];
  const impLabels     = ['(yo —)','tú','usted','nosotros','vosotros','ustedes'];

  let html = '';
  Object.entries(verb.forms).forEach(([tense, forms]) => {
    const nameObj = TENSE_DISPLAY_NAMES[tense] || { zh: tense, en: tense };
    const name = currentLang === 'en' ? nameObj.en : nameObj.zh;
    const labels = tense === 'imperativo' ? impLabels : pronounLabels;
    const irregIdx = verb.irregular[tense] || [];

    html += `<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">${name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px">`;

    forms.forEach((form, i) => {
      if (!form || form === '—') return;
      const isIrreg = irregIdx.includes(i);
      html += `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:5px 8px;border-radius:8px;background:var(--bg)">
        <span style="font-size:12px;color:var(--text-muted);flex-shrink:0;margin-right:8px">${labels[i]}</span>
        <span style="font-size:15px;font-weight:500;color:${isIrreg ? 'var(--irreg)' : 'var(--text)'};text-align:right">${form}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('modal-body').innerHTML = html;

  const modal = document.getElementById('conjModal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeConjModal() {
  document.getElementById('conjModal').style.display = 'none';
  document.body.style.overflow = '';
}

// Close with Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeConjModal();
});
</script>
</body>
</html>
